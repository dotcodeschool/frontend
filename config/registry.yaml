  branch: gitorial
  title: "Substrate Kitties: Build Your Own NFT Marketplace"
  author: Shawn Tabrizi
  author_url: https://github.com/shawntabrizi
  description: Learn the entry level concepts to develop your app on Polkadot by building an NFT marketplace.
  level: Intermediate
  language: Rust
  order: 2
  estimated_time: 8
  prerequisites:
    - Rust State Machine
  overview: |
    # Substrate Collectables Workshop

    Welcome to the Substrate Collectables Workshop.

    This is a guided tutorial intended to teach readers the entry level concepts around developing on Polkadot by building a simple NFT marketplace using the Polkadot SDK.

    If you do not feel comfortable with the level of Rust used in this tutorial, we recommend you first check out the [Rust State Machine](https://dotcodeschool.com/courses/rust-state-machine) tutorial.
